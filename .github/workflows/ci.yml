name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src || true   # non-blocking for now — tighten later
      - name: Unit tests (Ollama mocked)
        env:
          OLLAMA_HOST: http://mock
        run: pytest -q -m "not integration" --cov=src --cov-report=term-missing
      - name: Docker build
        run: docker build -t llm-wiki-poc:ci .
