name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; \
          elif [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff mypy pytest pytest-cov pytest-asyncio
      - name: Ruff
        run: ruff check src tests
      - name: Mypy (non-blocking)
        continue-on-error: true
        run: mypy src || true
      - name: Unit tests (Ollama mocked, non-blocking)
        continue-on-error: true
        env:
          OLLAMA_HOST: http://mock
        run: pytest -q -m "not integration" || true
      - name: Docker build (non-blocking)
        continue-on-error: true
        run: |
          if [ -f Dockerfile ]; then docker build -t llm-wiki-poc:ci . || true; \
          else echo "No Dockerfile — skipping"; fi
